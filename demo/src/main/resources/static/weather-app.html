<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Skye — Weather</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky: #0b1b3a;
            --sky-mid: #132244;
            --accent: #58b4ff;
            --accent-glow: rgba(88,180,255,0.25);
            --text: #e8f4ff;
            --muted: rgba(232,244,255,0.45);
            --card: rgba(255,255,255,0.05);
            --border: rgba(88,180,255,0.18);
            --error: #ff6b6b;
        }

        body {
            min-height: 100vh;
            background: var(--sky);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Atmospheric background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(88,180,255,0.15) 0%, transparent 70%),
                    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(20,60,120,0.4) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Stars */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--dur) var(--delay) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: var(--brightness); transform: scale(1.2); }
        }

        /* Floating clouds */
        .clouds {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            border-radius: 50px;
            background: rgba(88,180,255,0.04);
            filter: blur(30px);
            animation: drift var(--speed) linear infinite;
        }
        @keyframes drift {
            from { transform: translateX(-200px); }
            to   { transform: translateX(calc(100vw + 200px)); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 10;
            width: min(460px, 94vw);
            padding: 48px 44px 44px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            backdrop-filter: blur(24px);
            box-shadow: 0 0 60px rgba(88,180,255,0.08), 0 24px 64px rgba(0,0,0,0.4);
            animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--text);
            margin-bottom: 36px;
        }
        h1 span { color: var(--accent); }

        /* Search row */
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            padding: 14px 18px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]::placeholder { color: var(--muted); }
        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        button {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--sky);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 20px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        button:hover {
            background: #7ecbff;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 28px;
        }

        /* Result panel */
        .result {
            min-height: 100px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Loading spinner */
        .loader {
            display: none;
            align-self: center;
            margin: 16px auto;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(88,180,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loader.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Weather display */
        .weather-display {
            display: none;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        .weather-display.visible { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .city-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .city-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 0.06em;
            color: var(--text);
            line-height: 1;
            margin-bottom: 22px;
        }

        .weather-row {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: var(--accent-glow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .weather-main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 0.06em;
            color: var(--accent);
            line-height: 1;
        }

        .weather-details {
            font-size: 14px;
            font-weight: 300;
            color: var(--muted);
            text-transform: capitalize;
            line-height: 1.4;
        }

        /* Error */
        .error-msg {
            display: none;
            color: var(--error);
            font-size: 13px;
            font-weight: 400;
            padding: 12px 16px;
            background: rgba(255,107,107,0.08);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 10px;
            animation: shake 0.35s ease both;
        }
        .error-msg.visible { display: block; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* Footer hint */
        .hint {
            margin-top: 32px;
            font-size: 11px;
            color: rgba(232,244,255,0.2);
            text-align: center;
            letter-spacing: 0.04em;
        }
        .hint code {
            font-family: monospace;
            background: rgba(88,180,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            color: rgba(88,180,255,0.5);
        }
    </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Drifting clouds -->
<div class="clouds" id="clouds"></div>

<div class="card">
    <p class="brand">Skye Weather</p>
    <h1>What's the <span>Sky</span> Like?</h1>

    <div class="search-row">
        <input type="text" id="cityInput" placeholder="Enter a city name…" autocomplete="off"/>
        <button id="searchBtn" onclick="fetchWeather()">Search</button>
    </div>

    <div class="divider"></div>

    <div class="result">
        <div class="loader" id="loader"></div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="weather-display" id="weatherDisplay">
            <p class="city-label">Currently in</p>
            <p class="city-name" id="cityNameOut"></p>
            <div class="weather-row">
                <div class="icon-wrap" id="weatherIcon"></div>
                <div class="weather-info">
                    <p class="weather-main" id="weatherMain"></p>
                    <p class="weather-details" id="weatherDesc"></p>
                </div>
            </div>
        </div>
    </div>

    <p class="hint">Powered by <code>GET /api/v1/weather/{city}</code></p>
</div>

<script>
    // ── Stars ──────────────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --delay:${Math.random()*6}s;
      --brightness:${0.3+Math.random()*0.7};
      width:${Math.random()<0.2?3:2}px;
      height:${Math.random()<0.2?3:2}px;
    `;
        starsEl.appendChild(s);
    }

    // ── Clouds ─────────────────────────────────────────────────
    const cloudsEl = document.getElementById('clouds');
    for (let i = 0; i < 5; i++) {
        const c = document.createElement('div');
        c.className = 'cloud';
        const h = 40 + Math.random()*80;
        c.style.cssText = `
      top:${Math.random()*60}%;
      width:${150+Math.random()*250}px;
      height:${h}px;
      --speed:${30+Math.random()*40}s;
      animation-delay:-${Math.random()*30}s;
    `;
        cloudsEl.appendChild(c);
    }

    // ── Weather icons map ──────────────────────────────────────
    const iconMap = {
        thunderstorm: '⛈️', drizzle: '🌦️', rain: '🌧️',
        snow: '❄️', mist: '🌫️', smoke: '🌫️', haze: '🌫️',
        dust: '🌪️', fog: '🌫️', sand: '🌪️', ash: '🌋',
        squall: '💨', tornado: '🌪️', clear: '☀️', clouds: '☁️',
    };
    function getIcon(main) {
        return iconMap[main.toLowerCase()] || '🌡️';
    }

    // ── Fetch ──────────────────────────────────────────────────
    const BASE = 'http://localhost:8080';

    async function fetchWeather() {
        const city = document.getElementById('cityInput').value.trim();
        if (!city) return;

        const loader   = document.getElementById('loader');
        const display  = document.getElementById('weatherDisplay');
        const errorMsg = document.getElementById('errorMsg');
        const btn      = document.getElementById('searchBtn');

        // Reset
        display.classList.remove('visible');
        errorMsg.classList.remove('visible');
        loader.classList.add('active');
        btn.disabled = true;

        try {
            const res = await fetch(`${BASE}/api/v1/weather/${encodeURIComponent(city)}`);
            if (!res.ok) throw new Error(`Server responded with ${res.status}`);
            const data = await res.json();

            document.getElementById('cityNameOut').textContent = city;
            document.getElementById('weatherMain').textContent = data.weather || '—';
            document.getElementById('weatherDesc').textContent = data.details  || '';
            document.getElementById('weatherIcon').textContent = getIcon(data.weather || '');

            // Re-trigger animation
            display.classList.remove('visible');
            void display.offsetWidth;
            display.classList.add('visible');

        } catch (err) {
            errorMsg.textContent = `Couldn't fetch weather for "${city}". Check the city name or server connection.`;
            errorMsg.classList.remove('visible');
            void errorMsg.offsetWidth;
            errorMsg.classList.add('visible');
        } finally {
            loader.classList.remove('active');
            btn.disabled = false;
        }
    }

    // Enter key support
    document.getElementById('cityInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') fetchWeather();
    });
</script>
</body>
</html>
